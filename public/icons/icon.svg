<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background; rounded corners applied by the "any" variant via clip -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 2x2 suit grid, white pips. Each suit authored centered on (0,0) in ~ -34..34, -34..34,
       then translated into a quadrant and scaled. -->
  <g fill="#ffffff">
    <!-- Spade: top-left -->
    <g transform="translate(180,180) scale(1.7)">
      <path d="M0,-34 C 14,-12 34,-6 34,10 C 34,24 22,30 12,25
               C 14,31 18,36 24,40 L -24,40 C -18,36 -14,31 -12,25
               C -22,30 -34,24 -34,10 C -34,-6 -14,-12 0,-34 Z"/>
    </g>
    <!-- Heart: top-right -->
    <g transform="translate(332,180) scale(1.7)">
      <path d="M0,34 C -6,20 -34,6 -34,-12 C -34,-30 -12,-34 0,-16
               C 12,-34 34,-30 34,-12 C 34,6 6,20 0,34 Z"/>
    </g>
    <!-- Diamond: bottom-left -->
    <g transform="translate(180,332) scale(1.7)">
      <path d="M0,-40 L 30,0 L 0,40 L -30,0 Z"/>
    </g>
    <!-- Club: bottom-right -->
    <g transform="translate(332,332) scale(1.7)">
      <circle cx="0" cy="-16" r="14"/>
      <circle cx="-16" cy="8" r="14"/>
      <circle cx="16" cy="8" r="14"/>
      <path d="M-4,4 C -6,20 -14,32 -22,40 L 22,40 C 14,32 6,20 4,4 Z"/>
    </g>
  </g>
</svg>
